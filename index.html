<!DOCTYPE html>
<html lang="ar">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sudan Exams</title>

    <style>
        body {
            font-family: Arial;
            margin: 0;
            background: #f2f2f2;
            direction: rtl;
        }

        header {
            background: #0d47a1;
            color: white;
            padding: 20px;
            text-align: center;
            font-size: 24px;
        }

        .container {
            padding: 15px;
        }

        .subject {
            background: white;
            margin: 10px 0;
            padding: 15px;
            border-radius: 10px;
            cursor: pointer;
            box-shadow: 0 2px 5px rgba(0,0,0,0.1);
        }

        .subject:hover {
            background: #e3f2fd;
        }

        iframe {
            width: 100%;
            height: 500px;
            margin-top: 20px;
        }
    </style>
</head>
<body>

<header>
    Sudan Exams - امتحانات السودان
</header>

<div class="container">

    <div class="subject" onclick="openPDF('physics-2024.pdf')">
        الفيزياء
    </div>

    <div class="subject" onclick="openPDF('math-basic-2024.pdf')">
        الرياضيات الأساسية
    </div>

    <div class="subject" onclick="openPDF('english-2024.pdf')">
        اللغة الإنجليزية
    </div>

    <div class="subject" onclick="openPDF('arabic-2024.pdf')">
        اللغة العربية
    </div>

    <iframe id="viewer"></iframe>

</div>

<script>
function openPDF(file) {
    let url = "https://raw.githubusercontent.com/asmailsuliman63-sudo/REPO_NAME/main/" + file;
    document.getElementById('viewer').src = url;
}
</script>

</body>
</html>
